name: Build ZIP and Release Windows

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: ubuntu-latest
    env:
      ZIP_NAME: "Pong-Me-Windows.zip"
      S3_BUCKET: "pong-me.anystupididea.com"
      CLOUDFRONT_DIST_ID: "E29XY0JV1L6QI"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Windows build exists
        run: |
          if [ ! -f "Build/Windows/PongMe.exe" ]; then
            echo "ERROR: Build/Windows/PongMe.exe not found."
            echo "Build the Windows target locally in Unity (Build > Build Windows) and commit Build/Windows/ before tagging."
            exit 1
          fi

      - name: Stage README.txt into build folder
        run: cp installer/windows-README.txt Build/Windows/README.txt

      - name: Create ZIP
        run: |
          cd Build
          zip -r "../$ZIP_NAME" Windows/

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ZIP to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws s3 cp "$ZIP_NAME" "s3://$S3_BUCKET/$ZIP_NAME" \
            --content-type "application/zip"
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DIST_ID" \
            --paths "/$ZIP_NAME"
